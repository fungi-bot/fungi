name: PR-Agent

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pr_agent:
    name: Review pull request
    if: >-
      ${{
        github.event.sender.type != 'Bot' &&
        github.event.issue.pull_request != null &&
        startsWith(github.event.comment.body, '/') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Run PR-Agent
        uses: the-pr-agent/pr-agent@8e4d32e5497defd43c023a404f73560c62728961 # v0.39.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK.KEY: ${{ secrets.DEEPSEEK_KEY }}
          config.model: deepseek/deepseek-v4-pro
          config.fallback_models: '["deepseek/deepseek-v4-pro"]'
          config.custom_model_max_tokens: "1000000"
